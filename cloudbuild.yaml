# Lumi — Google Cloud Build configuration.
#
# Builds the container image from the existing ./Dockerfile and pushes it
# to Artifact Registry. Designed for both manual invocation and a Cloud
# Build trigger bound to the `master` branch.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#       --substitutions=SHORT_SHA=$(git rev-parse --short HEAD),_REGION=us-central1
#
# Trigger (push to master, once created):
#   gcloud builds triggers create github \
#       --repo-name=lumi --repo-owner=kannch8765 --branch-pattern="^master$" \
#       --build-config=cloudbuild.yaml \
#       --substitutions=_REGION=us-central1,_REPO=lumi
#
# NOTE: PROJECT_ID is intentionally NOT hardcoded. Supply via the trigger
# substitution `_PROJECT_ID` (or pass `--project=<your-project-id>` to
# `gcloud builds submit`). See deploy/README.md for the full pipeline.

# Build timeout: 10 minutes. `uv sync` against a warm cache is ~30s;
# 10 minutes is generous for a clean install on a small machine.
timeout: 600s

# Cache uv + pip artifacts between builds by re-using a layer cache
# keyed on the previous successful image. `--cache-from` pulls the
# `latest` tag as a cache source so Docker can reuse unchanged layers.
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: us-central1
  _REPO: lumi
  # _PROJECT_ID must be supplied by the trigger or `gcloud builds submit`.
  # Default empty so accidental local builds without --substitutions fail
  # loud rather than push to the wrong project.
  _PROJECT_ID: ""
  # GOTCHA (Task 27b, 2026-06-22): `SHORT_SHA` is a Cloud Build BUILT-IN
  # substitution (auto-populated from git HEAD). If we try to declare a
  # default for it in this block (`SHORT_SHA: "latest"`), Cloud Build
  # treats the key as user-defined and validates against the format
  # `^_[A-Z0-9_]+$` — `SHORT_SHA` doesn't start with `_`, so it rejects
  # with: "substitution key SHORT_SHA does not respect format
  # ^_[A-Z0-9_]+$". Fix: leave the default OUT of this block, and
  # reference `${SHORT_SHA}` (no `:-latest`) in the template — Cloud
  # Build auto-populates it from the caller (deploy.sh) or git HEAD.

steps:
  # ---- 1. Build the image using the existing Dockerfile ----
  # GOTCHA (Task 27b, 2026-06-22): bash variables referenced as
  # `${VAR}` inside the script are misread by Cloud Build as substitution
  # requests. If `VAR` isn't a built-in (PROJECT_ID, SHORT_SHA, etc.) or
  # user-defined (underscore-prefixed), Cloud Build rejects the template
  # with `key in the template 'IMAGE' is not a valid built-in
  # substitution`. Fix: use `$${VAR}` (double-dollar) to escape — the
  # first `$` becomes a literal `$` in the rendered script, then bash
  # dereferences the variable normally.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -z "${_PROJECT_ID}" ]; then
          echo "ERROR: _PROJECT_ID substitution is empty." >&2
          echo "Pass --substitutions=_PROJECT_ID=<your-project-id> or configure the trigger." >&2
          exit 1
        fi
        IMAGE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:${SHORT_SHA}"
        docker build \
          --build-arg COMMIT_SHA="${SHORT_SHA}" \
          --cache-from "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:latest" \
          --tag "$${IMAGE}" \
          --tag "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:latest" \
          -f Dockerfile \
          .
        echo "Built: $${IMAGE}"

  # ---- 2. Push both tags (immutable SHA + mutable :latest) ----
  # All `${_VAR}` and `${SHORT_SHA}` references here are valid Cloud Build
  # substitutions (underscore-prefixed = user-defined, `SHORT_SHA` =
  # built-in auto-populated from caller / git HEAD). Cloud Build
  # substitutes them before the script runs — bash never sees the
  # `${VAR}` form.
  - id: push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker push "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:${SHORT_SHA}"
        docker push "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:latest"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/lumi:latest"
