repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Lint
        language: python
        entry: ruff check
        additional_dependencies: ["ruff>=0.4.6"]
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: Ruff Format
        language: python
        entry: ruff format --check
        additional_dependencies: ["ruff>=0.4.6"]
        types: [python]
        pass_filenames: false
      - id: semgrep
        name: Semgrep Security Scan
        language: python
        entry: semgrep --error --config .semgrep/rules.yaml
        additional_dependencies: ["semgrep>=1.100.0"]
        types: [python]
        pass_filenames: false
      - id: lumi-guard
        name: Lumi personal info + author guard
        language: python
        entry: python scripts/pre_commit_hooks/lumi_guard.py
        additional_dependencies: []
        types: [file]
        pass_filenames: false
