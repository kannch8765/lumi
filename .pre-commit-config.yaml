repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Lint
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false
      - id: semgrep
        name: Semgrep Security Scan
        entry: uv run semgrep --error --config .semgrep/rules.yaml
        language: system
        types: [python]
        pass_filenames: false
